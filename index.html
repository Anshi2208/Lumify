<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lumify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ENTRY SCREEN -->
  <div id="entryScreen" class="screen">
    <input type="text" id="textInput" placeholder="Enter your message..." />

    <label>Text Color:</label>
    <input type="color" id="textColor" value="#ffffff">

    <button onclick="goToDisplay()">Next</button>
  </div>

  <!-- DISPLAY SCREEN -->
  <div id="displayScreen" class="display screen hidden" onclick="goBack()">
    <div id="scrollText"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
